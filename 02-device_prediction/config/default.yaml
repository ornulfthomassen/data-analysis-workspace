bigquery:
  project_id: "tnn-consumer-common-nx"
  dataset: "DataScience"
  subscription_hist_table: "tnn-consumer-common-nx.ADM.subscription_hist"
  subscription_master_table: "tnn-consumer-common-nx-gold.Dimensions.subscription_master_history"
  device_features_table: "tnn-consumer-common-nx.DataScience.device_features"
  score_output_dataset: "tnn-consumer-common-nx-gold.datascience"
  score_output_prefix: "device_change_score"

extraction:
  device_types:
    - "PDA"
    - "CLAMSHELL"
    - "SMARTPHONE"
    - "BLOCK"
    - "SLIDER"
    - "RUGGED"
  train_sample_rate: 0.4
  train_history_years: 3
  train_buffer_months: 2

cleaning:
  max_days_after_release: 730
  min_device_usage_days: 30

statistics:
  gen_stat_lookback_months: 13

target:
  max_horizon_months: 36

model:
  type: "gradient_boosted_survival"
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 4
  test_size: 0.2
  random_state: 42

device_agent:
  vertex_ai_project: "tnn-pnx-consumer-common-ai"
  vertex_ai_location: "europe-west1"
  model_name: "gemini-2.0-flash"
  batch_size: 10
  max_workers: 5
  max_retries: 3
  min_device_footprint: 500
